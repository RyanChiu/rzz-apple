name: Build DMG Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (for DMG filename), e.g. 1.0.1"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-macos-dmg:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build DMG
        run: |
          chmod +x scripts/build_dmg.sh
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          fi
          scripts/build_dmg.sh "$VERSION"

      - name: Create latest alias artifact
        run: |
          VERSIONED_DMG="$(find dist -maxdepth 1 -type f -name 'RZZ-*-macOS.dmg' ! -name 'RZZ-latest-macOS.dmg' | head -n 1)"
          if [ -z "$VERSIONED_DMG" ]; then
            echo "No versioned DMG found in dist/"
            exit 1
          fi
          LATEST_DMG="dist/RZZ-latest-macOS.dmg"
          cp "$VERSIONED_DMG" "$LATEST_DMG"

      - name: Generate SHA256 files
        run: |
          for dmg in dist/*.dmg; do
            shasum -a 256 "$dmg" > "$dmg.sha256"
          done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: RZZ-dmg
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.dmg.sha256

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.dmg.sha256
